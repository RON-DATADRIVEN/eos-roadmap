name: Sync modules.json from Issues

on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/5 * * * *"   # cada 5 minutos

permissions:
  contents: write
  issues: read

concurrency:
  group: sync-modules-json
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      ORG: RON-DATADRIVEN
      PROJECT_NUMBER: "3"
      OUTPUT: docs/modules.json
      META_OUTPUT: docs/modules-meta.json

    steps:
      - name: Checkout @ branch main
        uses: actions/checkout@v4
        with:
          ref: main              # evita detached HEAD
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.SYNC_PR_TOKEN || github.token }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true
          cache-dependency-path: |
            go.sum
            **/go.sum

      - name: Sanity repo (HEAD/replace/vendor)
        run: |
          set -euo pipefail
          echo "HEAD:"; git log -1 --oneline
          echo "replace en go.mod:"
          grep -n 'replace github.com/shurcooL/githubv4 => ./third_party/githubv4' go.mod
          echo "¿existe third_party/githubv4/go.mod?"
          test -f third_party/githubv4/go.mod && echo "OK" || (echo "Falta vendor third_party/githubv4" && exit 1)
          echo "Comprobando replace con go list:"
          go list -m -json github.com/shurcooL/githubv4 | sed -n '1,120p'

      - name: Sanity GraphQL (Projects v2)
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          ORG: ${{ env.ORG }}
          PROJ: ${{ env.PROJECT_NUMBER }}
        run: |
          set -euo pipefail
          echo "Viewer con este token:"
          gh api graphql -f query='{ viewer { login } }' --jq '.data.viewer.login'
          echo "Scopes del PAT:"
          gh api -i user | sed -n 's/^X-Oauth-Scopes: //p'
          echo "Header SSO (si aplica, debe decir 'authorized'):"
          gh api -i orgs/$ORG | sed -n '/^X-GitHub-SSO/p' || true
          echo "Projects v2 visibles en $ORG:"
          gh api graphql -f query='
          query($org:String!){
            organization(login:$org){
              projectsV2(first:50, orderBy:{field:TITLE, direction:ASC}){
                nodes { number title }
              }
            }
          }' -f org="$ORG" --jq '.data.organization.projectsV2.nodes'
          echo "Probar acceso directo a ProjectV2 #$PROJ"
          gh api graphql -f query='
          query($org:String!, $n:Int!){
            organization(login:$org){
              projectV2(number:$n){ id title }
            }
          }' -f org="$ORG" -F n="$PROJ" >/dev/null

      - name: Build sync tool
        run: |
          set -euo pipefail
          go mod tidy || true
          go build -o sync-modules ./cmd/sync-modules

      - name: Run sync
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          ORG: ${{ env.ORG }}
          PROJECT_NUMBER: ${{ env.PROJECT_NUMBER }}
          OUTPUT: ${{ env.OUTPUT }}
          META_OUTPUT: ${{ env.META_OUTPUT }}
        run: |
          set -euo pipefail
          ./sync-modules

      # Branch protection debe permitir que el token de checkout
      # (SYNC_PR_TOKEN si existe; si no, GITHUB_TOKEN) pueda hacer push directo a
      # main para los archivos generados docs/modules.json y docs/modules-meta.json.
      - name: Commit generated public data to main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -- docs/modules.json docs/modules-meta.json

          staged_files="$(git diff --cached --name-only)"
          if [ -z "$staged_files" ]; then
            echo "No generated public data changed."
            exit 0
          fi

          unexpected_files="$(printf '%s\n' "$staged_files" | grep -Ev '^(docs/modules\.json|docs/modules-meta\.json)$' || true)"
          if [ -n "$unexpected_files" ]; then
            echo "Unexpected staged files:"
            printf '%s\n' "$unexpected_files"
            exit 1
          fi

          git commit -m "ci(automation): update generated roadmap data"
          git push origin HEAD:main
