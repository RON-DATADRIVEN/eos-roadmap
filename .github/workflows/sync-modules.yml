name: Sync modules.json from Issues

on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write
  issues: read
  repository-projects: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true
          cache-dependency-path: |
            go.sum
            **/go.sum

      - name: Sanity GraphQL (Projects v2)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api graphql -f query='
          query($org:String!, $n:Int!){
            organization(login:$org){
              projectV2(number:$n){
                items(first:1){
                  nodes{
                    area: fieldValueByName(name:"Area"){
                      __typename
                      ... on ProjectV2ItemFieldSingleSelectValue { name }
                    }
                  }
                }
              }
            }
          }' -f org=RON-DATADRIVEN -F n=3 >/dev/null

      - name: Build sync tool
        run: |
          set -euo pipefail
          go mod tidy || true
          go build -o sync-modules ./cmd/sync-modules
          # si tienes vendor/:
          # go build -mod=vendor -ldflags "-s -w" -o sync-modules ./cmd/sync-modules

      - name: Run sync
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ORG: RON-DATADRIVEN
          PROJECT_NUMBER: "3"
          OUTPUT: docs/modules.json
        run: |
          set -euo pipefail
          ./sync-modules

      - name: Commit & push if changed
        run: |
          set -euo pipefail
          if ! git diff --quiet -- docs/modules.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/modules.json
            git commit -m "ci(sync): update modules.json [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
